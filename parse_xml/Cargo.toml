[package]
name = "parse_xml"
version = "0.1.0"
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
reqwest = { version = "0.12.7", features = ["json", "gzip"] }
tokio = { version = "1.40.0", features = ["full"] }
futures-util = "0.3.30"
quick-xml = { version = "0.36.1"}
chrono = { version = "0.4.38", default-features = false, features = ["std", "clock", "serde"] }
chrono-tz = "0.10.0"
roxmltree = { version = "0.20.0"}
anyhow = "1.0.88"

[lints]
workspace = true
